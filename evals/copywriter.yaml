# Copywriter — 4 golden cases.
#
# Uses built-in assertion types (icontains, not-icontains, javascript). The
# `output` variable is the RAW string response from the model. Copywriter
# prompt returns JSON with "subject" + "body" — we assert against the raw
# string for portability (matches whether the model returns .draft or .body).

description: "Copywriter draft quality: length, personalization, revision-follow-through"

prompts:
  - file://prompts/copywriter.md

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0
      response_format: { type: json_object }

tests:
  - description: "Draft length under 200 words (raw JSON is short)"
    vars:
      name: "Priya Sharma"
      profile_url: "https://github.com/priyasharma"
      evidence_url: "https://github.com/priyasharma/django-shop-api"
      evidence_summary: "django-shop-api, Postgres-backed, 400 stars"
      role: "backend engineer, Hyderabad"
      prior_output: ""
      revision_notes: ""
    assert:
      - type: javascript
        value: "output.trim().split(/\\s+/).length <= 250"

  - description: "Draft mentions the specific repo name from evidence"
    vars:
      name: "Meera Nair"
      profile_url: "https://github.com/meeranair"
      evidence_url: "https://github.com/meeranair/pg-migrate-cli"
      evidence_summary: "pg-migrate-cli — a Postgres migration CLI, 800 stars"
      role: "backend engineer, remote"
      prior_output: ""
      revision_notes: ""
    assert:
      - type: icontains
        value: "pg-migrate-cli"

  - description: "Draft references the concrete evidence (fastapi-cache or caching)"
    vars:
      name: "Rohit Menon"
      profile_url: "https://github.com/rohitmenon"
      evidence_url: "https://github.com/rohitmenon/fastapi-cache"
      evidence_summary: "fastapi-cache, a Redis-backed caching layer for FastAPI"
      role: "backend engineer, Hyderabad"
      prior_output: ""
      revision_notes: ""
    assert:
      - type: icontains-any
        value:
          - "fastapi-cache"
          - "caching"
          - "cache"

  - description: "Revision case: revised draft REMOVES fabricated Kafka/Razorpay"
    vars:
      name: "Amit Kumar"
      profile_url: "https://github.com/amitk"
      evidence_url: "https://github.com/amitk/py-flask-svc"
      evidence_summary: "py-flask-svc — Python + Flask microservice"
      role: "backend engineer"
      prior_output: "Hi Amit — your Kafka work at Razorpay is impressive."
      revision_notes: "REMOVE any mention of Kafka or Razorpay. Neither is in evidence. Reference only py-flask-svc and Python/Flask."
    assert:
      - type: not-icontains
        value: "kafka"
      - type: not-icontains
        value: "razorpay"
      - type: icontains-any
        value:
          - "flask"
          - "py-flask-svc"
          - "python"
